<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#F2F1F9" />
<title>Momentum — small days, real momentum</title>
<meta name="description" content="Momentum is a habit tracker built around your first seven days. Start tiny, get one gentle nudge, and watch your week charge up — with forgiving streaks that survive an off day." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   MOMENTUM — "Electric Calm" design tokens
   Building a habit is momentum: small motion that heats up.
   Boldness spent on ONE signature — the charging Momentum Ring
   (cool iris -> hot ember). Cyan reserved only for "freeze".
   ============================================================ */
:root{
  --cloud:#F2F1F9;        /* app background, cool lavender-white */
  --cloud-2:#FAFAFE;      /* faint lift */
  --surface:#FFFFFF;      /* cards */
  --ink:#181530;          /* deep iris-black, text */
  --ink-2:#58536F;        /* secondary text */
  --ink-3:#9893B0;        /* tertiary / placeholders */
  --line:#E4E1F2;         /* hairlines / borders / empty track */
  --line-2:#EEECF8;       /* softer fills */
  --iris:#5B45F0;         /* primary — electric indigo-violet */
  --iris-deep:#4733C7;    /* pressed / emphasis */
  --iris-wash:#ECE9FE;    /* pale violet surface */
  --ember:#FF6A3D;        /* momentum + celebration (warm) */
  --ember-deep:#E8501F;
  --ember-soft:#FFE3D6;
  --glacier:#1FA9E0;      /* freeze only */
  --glacier-soft:#D8EEF9;
  --shadow:0 1px 2px rgba(24,21,48,.05), 0 10px 28px rgba(24,21,48,.07);
  --shadow-lg:0 18px 50px rgba(24,21,48,.20);
  --shadow-iris:0 8px 22px rgba(91,69,240,.30);
  --shadow-ember:0 8px 22px rgba(255,106,61,.32);
  --r-sm:12px; --r:18px; --r-lg:24px; --r-xl:30px; --r-pill:999px;
  --display:"Space Grotesk",ui-sans-serif,system-ui,sans-serif;
  --sans:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --app-w:412px;
  --app-h:926px;
  --ease:cubic-bezier(.21,.7,.32,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:
    radial-gradient(1100px 640px at 50% -240px, #E9E6FA 0%, var(--cloud) 58%),
    var(--cloud);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  min-height:100%;
  display:flex; align-items:center; justify-content:center;
  padding:30px 16px;
  overflow-x:hidden;
}

/* ---------- phone frame (desktop) / full-bleed (mobile) ---------- */
.stage{ width:100%; display:flex; flex-direction:column; align-items:center; gap:14px; }
.frame{
  width:var(--app-w); height:var(--app-h);
  max-height:calc(100dvh - 24px);
  background:linear-gradient(160deg,#26213F,#15122A);
  border-radius:48px; padding:10px;
  box-shadow:var(--shadow-lg), 0 0 0 2px rgba(24,21,48,.10);
  position:relative; isolation:isolate;
}
.frame::after{ /* side button */
  content:""; position:absolute; right:-3px; top:172px; width:3px; height:58px;
  background:rgba(24,21,48,.22); border-radius:3px;
}
.screen{
  position:relative; width:100%; height:100%;
  background:var(--cloud); border-radius:39px; overflow:hidden;
  display:flex; flex-direction:column;
}
.island{
  position:absolute; top:11px; left:50%; transform:translateX(-50%);
  width:112px; height:30px; background:#0D0B1C; border-radius:var(--r-pill);
  z-index:60;
}

/* scrollable app body */
.view{ flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; position:relative; }
.view::-webkit-scrollbar{ width:0 }
.pad{ padding:52px 22px 24px; }

/* ---------- type helpers ---------- */
.eyebrow{ font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--iris); }
.display{ font-family:var(--display); }
h1,h2,h3{ font-family:var(--display); font-weight:600; line-height:1.06; letter-spacing:-.02em; color:var(--ink); }
.title{ font-size:30px; }
.subtitle{ font-size:15px; color:var(--ink-2); line-height:1.5; font-weight:400; }

/* ---------- buttons ---------- */
.btn{
  font-family:var(--sans); font-weight:700; font-size:16px;
  border:none; border-radius:var(--r-pill); cursor:pointer;
  padding:16px 22px; width:100%;
  display:inline-flex; align-items:center; justify-content:center; gap:9px;
  transition:transform .16s var(--ease), box-shadow .2s var(--ease), background .2s, color .2s;
  min-height:54px; letter-spacing:-.01em;
}
.btn:active{ transform:scale(.977) }
.btn-primary{ background:var(--iris); color:#fff; box-shadow:var(--shadow-iris); }
.btn-primary:hover{ background:var(--iris-deep) }
.btn-ember{ background:var(--ember); color:#fff; box-shadow:var(--shadow-ember); }
.btn-ember:hover{ background:var(--ember-deep) }
.btn-soft{ background:var(--iris-wash); color:var(--iris-deep); }
.btn-soft:hover{ background:#E1DCFD }
.btn-ghost{ background:transparent; color:var(--ink-2); min-height:46px; padding:12px; font-weight:600; }
.btn-ghost:hover{ color:var(--ink) }
.btn-row{ display:flex; gap:10px; }
.btn-row .btn{ flex:1 }

:focus-visible{ outline:3px solid var(--ember); outline-offset:2px; border-radius:8px; }

/* ============================================================ */
/* WELCOME                                                       */
/* ============================================================ */
.welcome{ height:100%; display:flex; flex-direction:column; justify-content:space-between;
  padding:60px 28px 32px; text-align:left;
  background:
    radial-gradient(120% 64% at 78% -6%, rgba(255,106,61,.16) 0%, rgba(255,106,61,0) 48%),
    radial-gradient(120% 60% at 6% 8%, rgba(91,69,240,.16) 0%, rgba(91,69,240,0) 50%),
    linear-gradient(180deg, var(--cloud-2), var(--cloud) 64%);
}
.brandmark{ display:flex; align-items:center; gap:11px; }
.brand-name{ font-family:var(--display); font-size:21px; font-weight:700; letter-spacing:-.02em; }
.welcome-ring{ margin:auto auto 8px; }
.welcome-hero h1{ font-size:42px; line-height:1.03; font-weight:600; letter-spacing:-.03em; }
.welcome-hero h1 em{ font-style:normal; color:var(--iris); }
.welcome-hero p{ margin-top:16px; font-size:16px; color:var(--ink-2); line-height:1.55; max-width:30ch; }
.welcome-foot{ font-size:12.5px; color:var(--ink-3); text-align:center; margin-top:13px; font-weight:500; }

/* ============================================================ */
/* ONBOARDING                                                    */
/* ============================================================ */
.ob-top{ padding:48px 22px 6px; }
.steps{ display:flex; gap:6px; margin-bottom:22px; }
.steps i{ height:5px; border-radius:5px; flex:1; background:var(--line); transition:background .3s; }
.steps i.on{ background:var(--iris) }
.steps i.done{ background:var(--iris-deep) }
.ob-q{ font-size:27px; margin-bottom:7px; }
.ob-sub{ font-size:14.5px; color:var(--ink-2); line-height:1.5; }

/* template list */
.templates{ padding:16px 22px 0; display:flex; flex-direction:column; gap:10px; }
.tmpl{
  display:flex; align-items:center; gap:14px; width:100%; text-align:left;
  background:var(--surface); border:1.5px solid var(--line); border-radius:var(--r);
  padding:14px 15px; cursor:pointer;
  transition:border-color .18s, background .18s, transform .12s var(--ease), box-shadow .18s;
}
.tmpl:hover{ border-color:var(--iris); box-shadow:var(--shadow) }
.tmpl:active{ transform:scale(.99) }
.tmpl.sel{ border-color:var(--iris); background:var(--iris-wash); box-shadow:0 0 0 3px rgba(91,69,240,.14) }
.tmpl-ic{ width:42px; height:42px; flex:none; border-radius:13px; background:var(--iris-wash);
  display:grid; place-items:center; color:var(--iris); transition:.18s; }
.tmpl.sel .tmpl-ic{ background:#fff }
.tmpl-tx b{ display:block; font-size:15.5px; font-weight:700; color:var(--ink); }
.tmpl-tx span{ font-size:13px; color:var(--ink-2); }
.tmpl-check{ margin-left:auto; color:var(--iris); opacity:0; transform:scale(.6); transition:.18s var(--ease) }
.tmpl.sel .tmpl-check{ opacity:1; transform:scale(1) }

/* fields */
.field{ margin-top:18px; }
.field label{ display:block; font-size:13px; font-weight:700; color:var(--ink-2); margin-bottom:7px; }
.input{
  width:100%; font-family:var(--sans); font-size:16px; font-weight:500; color:var(--ink);
  background:var(--surface); border:1.5px solid var(--line); border-radius:var(--r-sm);
  padding:14px; transition:border-color .18s, box-shadow .18s;
}
.input::placeholder{ color:var(--ink-3); font-weight:400 }
.input:focus{ outline:none; border-color:var(--iris); box-shadow:0 0 0 3px rgba(91,69,240,.16) }

.tiny-card{ margin-top:16px; background:linear-gradient(150deg,var(--iris-wash),var(--cloud-2));
  border:1.5px solid var(--line-2); border-radius:var(--r); padding:16px 17px; }
.tiny-card .lab{ font-size:11px; font-weight:700; letter-spacing:.13em; text-transform:uppercase; color:var(--iris); }
.tiny-card .big{ font-family:var(--display); font-size:22px; font-weight:600; margin-top:6px; line-height:1.16; letter-spacing:-.02em; }
.tiny-card .why{ font-size:12.5px; color:var(--ink-2); margin-top:10px; line-height:1.45; display:flex; gap:7px; align-items:flex-start; }
.tiny-card .why svg{ color:var(--ember); flex:none; margin-top:1px }

.chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.chip{ font-family:var(--sans); font-size:13px; font-weight:600; color:var(--iris-deep);
  background:var(--iris-wash); border:1.5px solid transparent; border-radius:var(--r-pill);
  padding:9px 14px; cursor:pointer; transition:.16s }
.chip:hover{ background:#E1DCFD }
.chip.sel{ background:#fff; border-color:var(--iris); color:var(--ink) }

/* reminder step */
.rem-card{ margin-top:8px; background:var(--surface); border:1.5px solid var(--line);
  border-radius:var(--r); overflow:hidden; }
.rem-row{ display:flex; align-items:center; gap:13px; padding:16px; }
.rem-row + .rem-row{ border-top:1.5px solid var(--line-2) }
.rem-ic{ width:40px; height:40px; border-radius:12px; background:var(--iris-wash); display:grid; place-items:center; color:var(--iris); flex:none }
.rem-tx{ flex:1 }
.rem-tx b{ display:block; font-size:15px; font-weight:700 }
.rem-tx span{ font-size:12.5px; color:var(--ink-2) }
.time-input{ font-family:var(--display); font-weight:600; font-size:15px; color:var(--iris-deep);
  background:var(--iris-wash); border:none; border-radius:var(--r-sm); padding:9px 12px; cursor:pointer }
.time-input:focus{ outline:none; box-shadow:0 0 0 3px rgba(91,69,240,.22) }

/* iOS-style switch */
.switch{ position:relative; width:50px; height:30px; flex:none; cursor:pointer }
.switch input{ position:absolute; opacity:0; width:100%; height:100%; margin:0; cursor:pointer }
.switch .track{ position:absolute; inset:0; background:var(--line); border-radius:var(--r-pill); transition:background .22s }
.switch .knob{ position:absolute; top:3px; left:3px; width:24px; height:24px; background:#fff; border-radius:50%;
  box-shadow:0 1px 3px rgba(0,0,0,.22); transition:transform .22s var(--ease) }
.switch input:checked + .track{ background:var(--iris) }
.switch input:checked + .track + .knob{ transform:translateX(20px) }
.rem-note{ font-size:12px; color:var(--ink-3); line-height:1.45; margin:14px 4px 0; display:flex; gap:7px; align-items:flex-start }
.rem-note svg{ flex:none; margin-top:1px }

/* sticky onboarding footer */
.ob-foot{ padding:14px 22px calc(20px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg, rgba(242,241,249,0), var(--cloud) 36%); }

/* first-log moment */
.firstwin-wrap .ob-foot{ padding-top:18px }

/* ============================================================ */
/* APP — HOME / TODAY                                            */
/* ============================================================ */
.app-head{ padding:50px 22px 4px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px }
.app-head .hello .eyebrow{ margin-bottom:3px; color:var(--ink-3) }
.app-head .hello h2{ font-size:24px }
.icon-btn{ width:42px; height:42px; border-radius:50%; border:1.5px solid var(--line); background:var(--surface);
  display:grid; place-items:center; cursor:pointer; color:var(--ink-2); transition:.16s; flex:none }
.icon-btn:hover{ border-color:var(--iris); color:var(--iris) }

/* ---- THE SIGNATURE: Momentum Ring ---- */
.ring-wrap{ position:relative; display:grid; place-items:center; }
.ring-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.ring-flame{ color:var(--ember); height:22px; margin-bottom:-2px; filter:drop-shadow(0 2px 5px rgba(255,106,61,.4)); }
.ring-num{ font-family:var(--display); font-weight:600; line-height:.92; letter-spacing:-.04em; color:var(--ink); }
.ring-cap{ font-size:8.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--ink-3); margin-top:3px }
.ring-glyph{ color:var(--iris) }
.seg-today{ animation:breathe 2.4s ease-in-out infinite }
@keyframes breathe{ 0%,100%{opacity:.5} 50%{opacity:1} }
.ring-tick .ring-num{ animation:tick .55s var(--ease) }
@keyframes tick{ 0%{transform:scale(1)} 36%{transform:scale(1.14)} 100%{transform:scale(1)} }

.hero{ margin:14px 22px 0; background:var(--surface); border:1.5px solid var(--line); border-radius:var(--r-xl);
  padding:16px 18px; display:flex; flex-direction:row; align-items:center; gap:16px; cursor:pointer; position:relative; overflow:hidden; }
.hero::before{ content:""; position:absolute; top:-60px; left:-20px; width:200px; height:160px;
  background:radial-gradient(circle, rgba(91,69,240,.10), transparent 70%); }
.hero-ring{ flex:none; position:relative }
.hero-meta{ display:flex; flex-direction:column; gap:8px; flex:1; min-width:0 }
.hmeta{ background:var(--cloud-2); border:1.5px solid var(--line-2); border-radius:var(--r); padding:9px 11px;
  display:flex; align-items:center; gap:9px; }
.hmeta .ic{ flex:none }
.hmeta .n{ font-family:var(--display); font-size:18px; font-weight:600; color:var(--ink); line-height:1 }
.hmeta .t{ font-size:11px; color:var(--ink-2); line-height:1.2; margin-top:2px }

/* activation strip — encodes the North Star (3 of first 7) */
.activate{ margin:14px 22px 0; background:linear-gradient(150deg, var(--iris-wash), var(--cloud-2));
  border:1.5px solid var(--line-2); border-radius:var(--r-lg); padding:16px 18px; }
.activate-h{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
.activate-h b{ font-size:14px; font-weight:700; color:var(--ink) }
.activate-h .of{ font-family:var(--display); font-size:13px; font-weight:600; color:var(--iris-deep) }
.abar{ height:9px; border-radius:9px; background:var(--line); margin-top:12px; overflow:hidden; display:flex; gap:3px; padding:0 }
.abar i{ flex:1; border-radius:9px; background:var(--line); transition:background .4s var(--ease) }
.abar i.fill{ background:linear-gradient(90deg, var(--iris), var(--ember)) }
.activate-note{ font-size:12.5px; color:var(--ink-2); margin-top:11px; line-height:1.45; }
.activate.done{ background:linear-gradient(150deg, var(--ember-soft), var(--cloud-2)); border-color:#F8D8C9 }
.activate.done .of{ color:var(--ember-deep) }

/* section header */
.sec-h{ display:flex; align-items:center; justify-content:space-between; margin:24px 22px 12px }
.sec-h h3{ font-family:var(--sans); font-size:16px; font-weight:800; letter-spacing:-.01em; color:var(--ink) }
.sec-h .date{ font-size:12.5px; color:var(--ink-3); font-weight:600 }

/* habit list / log targets */
.habits{ padding:0 22px; display:flex; flex-direction:column; gap:10px }
.habit{
  display:flex; align-items:center; gap:14px; background:var(--surface);
  border:1.5px solid var(--line); border-radius:var(--r); padding:14px 15px;
  transition:border-color .2s, background .25s, transform .12s var(--ease), box-shadow .2s; position:relative; overflow:hidden;
}
.habit:hover{ box-shadow:var(--shadow) }
.habit-ic{ width:44px; height:44px; flex:none; border-radius:13px; background:var(--iris-wash); display:grid; place-items:center; color:var(--iris); transition:.25s }
.habit-tx{ flex:1; min-width:0 }
.habit-tx b{ display:block; font-size:15.5px; font-weight:700; color:var(--ink); line-height:1.2 }
.habit-tx span{ font-size:12.5px; color:var(--ink-2); display:block; margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.logbtn{
  width:46px; height:46px; flex:none; border-radius:50%; cursor:pointer;
  border:2px solid var(--line); background:var(--surface); color:var(--line);
  display:grid; place-items:center; transition:.22s var(--ease);
}
.logbtn:hover{ border-color:var(--iris); color:var(--iris) }
.logbtn:active{ transform:scale(.9) }
.habit.done{ background:var(--iris-wash); border-color:#DCD6FC }
.habit.done .habit-ic{ background:#fff }
.habit.done .logbtn{ background:var(--iris); border-color:var(--iris); color:#fff; box-shadow:var(--shadow-iris) }
.habit.just .logbtn{ animation:pop .45s var(--ease) }
@keyframes pop{ 0%{transform:scale(1)} 40%{transform:scale(1.22)} 100%{transform:scale(1)} }
.habit.just::before{ content:""; position:absolute; inset:0; background:radial-gradient(circle at 88% 50%, rgba(255,106,61,.20), transparent 60%); animation:wash .7s var(--ease) forwards }
@keyframes wash{ from{opacity:1} to{opacity:0} }

.add-habit{ margin:12px 22px 0; }
.add-habit button{ width:100%; display:flex; align-items:center; justify-content:center; gap:9px;
  background:transparent; border:1.6px dashed var(--line); border-radius:var(--r); padding:14px;
  color:var(--iris); font-family:var(--sans); font-weight:700; font-size:14.5px; cursor:pointer; transition:.18s }
.add-habit button:hover{ border-color:var(--iris); background:var(--iris-wash) }

.nudge{ margin:14px 22px 0; background:var(--ember-soft); border:1.5px solid #F8D3C2; border-radius:var(--r);
  padding:13px 15px; display:flex; gap:11px; align-items:center }
.nudge .ic{ color:var(--ember-deep); flex:none }
.nudge .tx{ font-size:13px; color:#8a3a1d; line-height:1.4 }
.nudge .tx b{ font-weight:700 }

.reflect{ margin:18px 22px 8px; text-align:center; font-size:13px; color:var(--ink-3); font-weight:500; }

/* ---------- PROGRESS TAB ---------- */
.stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 22px; margin-top:6px }
.stat{ background:var(--surface); border:1.5px solid var(--line); border-radius:var(--r); padding:16px }
.stat .n{ font-family:var(--display); font-size:30px; font-weight:600; color:var(--ink); line-height:1; letter-spacing:-.02em }
.stat .l{ font-size:12px; color:var(--ink-2); margin-top:6px; font-weight:500 }
.stat.accent{ background:linear-gradient(150deg,var(--iris-wash),var(--cloud-2)); border-color:var(--line-2) }
.cal{ margin:18px 22px 0; background:var(--surface); border:1.5px solid var(--line); border-radius:var(--r-lg); padding:18px }
.cal h4{ font-family:var(--sans); font-size:14px; font-weight:800; margin-bottom:14px; color:var(--ink) }
.cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:7px }
.cal-dow{ font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-3); text-align:center; font-weight:700; padding-bottom:2px }
.cal-cell{ aspect-ratio:1; border-radius:10px; background:var(--line-2); display:grid; place-items:center; font-size:11px; color:var(--ink-3); font-weight:600; position:relative }
.cal-cell.done{ background:var(--iris); color:#fff }
.cal-cell.frozen{ background:var(--glacier-soft); color:var(--glacier) }
.cal-cell.miss{ background:var(--cloud-2); border:1.5px dotted var(--line) }
.cal-cell.today{ box-shadow:0 0 0 2px var(--ember) }
.cal-cell.future{ background:transparent; color:var(--line) }
.legend{ display:flex; flex-wrap:wrap; gap:14px; margin:14px 24px 0 }
.legend span{ font-size:11.5px; color:var(--ink-2); display:flex; align-items:center; gap:6px; font-weight:500 }
.legend i{ width:13px; height:13px; border-radius:4px; display:inline-block }

/* ---------- SETTINGS TAB ---------- */
.set-list{ margin:8px 22px 0; background:var(--surface); border:1.5px solid var(--line); border-radius:var(--r); overflow:hidden }
.set-row{ display:flex; align-items:center; gap:13px; padding:15px 16px }
.set-row + .set-row{ border-top:1.5px solid var(--line-2) }
.set-row .ic{ width:38px; height:38px; border-radius:11px; background:var(--iris-wash); display:grid; place-items:center; color:var(--iris); flex:none }
.set-row .tx{ flex:1 }
.set-row .tx b{ display:block; font-size:14.5px; font-weight:700 }
.set-row .tx span{ font-size:12px; color:var(--ink-2) }

/* ============================================================ */
/* BOTTOM NAV                                                    */
/* ============================================================ */
.nav{ display:flex; padding:5px 16px calc(7px + env(safe-area-inset-bottom)); background:var(--cloud-2);
  border-top:1.5px solid var(--line); position:relative; z-index:40 }
.nav button{ flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column;

function addDays(isoStr, n){ const d=new Date(isoStr+'T00:00:00'); d.setDate(d.getDate()+n); return iso(d); }
function cursor(){ const real=state.startTs?Math.floor((Date.now()-state.startTs)/DAY):0; return Math.max(real, state.advance||0); }
function niceDate(isoStr){ return new Date(isoStr+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
function dow1(isoStr){ return new Date(isoStr+'T00:00:00').toLocaleDateString(undefined,{weekday:'short'}).slice(0,1); }
function greeting(){ const h=new Date().getHours(); return h<12?'Good morning':h<18?'Good afternoon':'Good evening'; }
function fmtTime(t){ const [h,m]=t.split(':').map(Number); const ap=h<12?'AM':'PM'; const hh=((h+11)%12)+1; return `${hh}:${pad(m)} ${ap}`; }

/* ---------- derived state (pure; recomputed each render) ---------- */
function compute(){
  const start = state.startISO, cur = cursor();
  const loggedDay = i => state.habits.some(h => state.logs[h.id+'|'+addDays(start,i)]);
  const frozen = {}; let fr = state.freezesMax, lastWk = -1;
  for(let i=0;i<=cur;i++){
    const wk = Math.floor(i/7);
    if(wk>lastWk){ fr = state.freezesMax; lastWk = wk; }            // freezes refill each week
    if(i<cur && !loggedDay(i)){ if(fr>0){ frozen[i]=true; fr--; } } // auto-cover a missed past day
  }
  let streak=0, d=cur;
  if(!loggedDay(cur)) d=cur-1;                                      // today in-progress doesn't break a streak
  while(d>=0){ if(loggedDay(d)){streak++;d--;} else if(frozen[d]){d--;} else break; }
  const set=new Set(); for(const k in state.logs){ if(state.logs[k]) set.add(k.split('|')[1]); }
  let week1=0; for(let i=0;i<7&&i<=cur;i++) if(loggedDay(i)) week1++;
  const wkNow=Math.floor(cur/7); let twTotal=0, twDone=0;
  for(let i=wkNow*7;i<=cur;i++){ twTotal++; if(loggedDay(i)) twDone++; }
  return { start, cur, curDate:addDays(start,cur), loggedDay, frozen,
           freezesLeft:fr, streak, totalDays:set.size, week1, wkNow, twTotal, twDone };
}

/* ===========================================================================
   THE SIGNATURE — Momentum Ring (SVG arc gauge)
=========================================================================== */
function polar(cx,cy,r,deg){ const a=(deg-90)*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
function arcPath(cx,cy,r,a0,a1){
  const [x1,y1]=polar(cx,cy,r,a0), [x2,y2]=polar(cx,cy,r,a1);
  const large=(a1-a0)<=180?0:1;
  return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
}
/* fills: array of 7 statuses: 'done'|'todayDone'|'today'|'frozen'|'miss'|'future' */
function ringSVG(fills, size){
  const cx=size/2, cy=size/2, sw=Math.round(size*0.072), r=size/2 - sw/2 - 3;
  const gap=7, seg=(360 - 7*gap)/7;
  let bg='', fg='';
  let leadAngle=null, ignite=false, doneCount=0;
  for(let i=0;i<7;i++){
    const a0=i*(seg+gap)+gap/2, a1=a0+seg;
    bg += `<path d="${arcPath(cx,cy,r,a0,a1)}" stroke="var(--line)" stroke-width="${sw}" fill="none" stroke-linecap="round"/>`;
    const s=fills[i];
    if(s==='done'||s==='todayDone'){
      const col=RAMP[i];
      const cls=s==='todayDone'?' class="seg-today"':'';
      fg += `<path${cls} d="${arcPath(cx,cy,r,a0,a1)}" stroke="${col}" stroke-width="${sw}" fill="none" stroke-linecap="round"/>`;
      leadAngle=a1; doneCount++;
      if(i>=2) ignite=true; // 3rd day (index 2) lights the spark
    } else if(s==='frozen'){
      fg += `<path d="${arcPath(cx,cy,r,a0,a1)}" stroke="var(--glacier)" stroke-width="${sw}" fill="none" stroke-linecap="round" opacity=".9"/>`;
    } else if(s==='today'){
      fg += `<path class="seg-today" d="${arcPath(cx,cy,r,a0,a1)}" stroke="var(--iris)" stroke-width="${sw}" fill="none" stroke-linecap="round" stroke-dasharray="2 ${Math.round(sw*0.9)}"/>`;
    }
  }
  let spark='';
  if(leadAngle!=null){
    const [sx,sy]=polar(cx,cy,r,leadAngle);
    const col=ignite?'#FF6A3D':RAMP[Math.max(0,doneCount-1)];
    spark = `<circle cx="${sx.toFixed(2)}" cy="${sy.toFixed(2)}" r="${(sw*0.62).toFixed(1)}" fill="#fff"/>`
          + `<circle cx="${sx.toFixed(2)}" cy="${sy.toFixed(2)}" r="${(sw*0.42).toFixed(1)}" fill="${col}"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">${bg}${fg}${spark}</svg>`;
}
function weekFills(c){
  const wk=c.wkNow, out=[];
  for(let j=0;j<7;j++){
    const di=wk*7+j;
    if(di>c.cur) out.push('future');
    else if(di===c.cur) out.push(c.loggedDay(di)?'todayDone':'today');
    else if(c.loggedDay(di)) out.push('done');
    else if(c.frozen[di]) out.push('frozen');
    else out.push('miss');
  }
  return out;
}

function calendarCells(c){
  const start=c.start;
  const startDow=(new Date(start+'T00:00:00').getDay()+6)%7; // 0=Mon
  const total=c.cur+1;
  const weeks=Math.ceil((startDow+Math.max(total,30))/7);
  let out='';
  for(let cell=0; cell<weeks*7; cell++){
    const di=cell-startDow;
    if(di<0){ out+='<div class="cal-cell future"></div>'; continue; }
    const dateStr=addDays(start,di);
    const n=new Date(dateStr+'T00:00:00').getDate();
    let cls='';
    if(di>c.cur) cls='future';
    else if(c.loggedDay(di)) cls='done';
    else if(c.frozen[di]) cls='frozen';
    else cls='miss';
    if(di===c.cur) cls+=' today';
    out+=`<div class="cal-cell ${cls}">${di>c.cur?'':n}</div>`;
  }
  return out;
}

      <div class="set-row tap" data-act="streak"><span class="ic" style="color:var(--glacier);background:var(--glacier-soft)">${ic('snow',18)}</span><span class="tx"><b>How streaks work</b><span>The forgiving kind</span></span><span style="color:var(--line)">${ic('chev',18)}</span></div>
    </div>
    <div class="reflect" style="margin-top:24px">Momentum · a calm place to begin</div>
    <div style="height:90px"></div>`;
}

/* ===========================================================================
   OVERLAYS
=========================================================================== */
function renderOverlay(){
  const id=OQ[0]||UI.overlay||null;
  if(!id){ ovRoot.innerHTML=''; return; }
  let html='';
  if(id==='firstwin') html=ovFirstWin();
  else if(id==='activate') html=ovActivate();
  else if(id.startsWith('week:')) html=ovWeek(parseInt(id.split(':')[1],10));
  else if(id==='streak') html=ovStreak();
  else if(id==='add') html=ovAdd();
  else if(id==='habitedit') html=ovHabitEdit();
  ovRoot.innerHTML=html;
  if(id==='firstwin'||id==='activate') burst();
}
function ovFirstWin(){
  return `<div class="overlay center"><div class="sheet card celebrate">
    <div style="margin:0 auto 16px">${ringWrap(['todayDone','future','future','future','future','future','future'],128,`<div class="ring-num" style="font-size:46px">1</div>`)}</div>
    <h2>That's day one.</h2>
    <p>The hardest part is starting — and you just did. Your streak begins here.</p>
    <div class="pills"><span class="pill"><b>1</b>day streak</span></div>
    <button class="btn btn-ember" data-act="ov-close" style="margin-top:18px">Keep it going</button>
  </div></div>`;
}
function ovActivate(){
  const c=compute();
  return `<div class="overlay center"><div class="sheet card celebrate">
    <div style="margin:0 auto 14px">${ringWrap(weekFills(c),128,`<div class="ring-flame">${ic('flame',20,1.8)}</div><div class="ring-num" style="font-size:40px">3</div>`)}</div>
    <div class="eyebrow" style="color:var(--ember-deep);margin-bottom:8px">Momentum ignited</div>
    <h2>Three days in.</h2>
    <p>This is the number that matters. People who log 3 times in their first week are the ones who keep the habit. You're officially one of them.</p>
    <div class="pills">
      <span class="pill"><b>${c.streak}</b>day streak</span>
      <span class="pill"><b>${c.week1}</b>/7 this week</span>
    </div>
    <button class="btn btn-ember" data-act="ov-close" style="margin-top:20px">Love that</button>
  </div></div>`;
}
function ovWeek(w){
  const c=compute();
  let done=0, frozen=0, cells='';
  for(let i=w*7;i<w*7+7;i++){
    const within=i<=c.cur;
    const dn=within&&c.loggedDay(i);
    const fz=within&&!dn&&c.frozen[i];
    if(dn) done++; if(fz) frozen++;
    cells+=`<div class="c ${dn?'done':fz?'frozen':''}">${within?dow1(addDays(c.start,i)):''}</div>`;
  }
  const quote = done===7 ? 'A perfect week. Quietly remarkable.'
    : done>=3 ? 'You showed up where it counted. That\'s how habits are built.'
    : 'Every day you logged moved you forward. Onward.';
  return `<div class="overlay"><div class="sheet wsum">
    <div class="grab"></div>
    <div class="eyebrow">Week ${w+1} recap</div>
    <h2>Your week, gently.</h2>
    <p class="lead">Here's how the last seven days went — no judgement, just the picture.</p>
    <div class="wsum-week">${cells}</div>
    <div class="wsum-row"><span class="ic">${ic('check',20)}</span><span class="tx"><b>Days you showed up</b><span>Out of seven</span></span><span class="v">${done}</span></div>
    <div class="wsum-row"><span class="ic" style="color:var(--ember)">${ic('flame',20,1.8)}</span><span class="tx"><b>Streak right now</b><span>Current run</span></span><span class="v">${c.streak}</span></div>
    <div class="wsum-row"><span class="ic">${ic('sprout',20)}</span><span class="tx"><b>Total days, all-time</b><span>Never resets</span></span><span class="v">${c.totalDays}</span></div>
    ${frozen?`<div class="wsum-row"><span class="ic" style="color:var(--glacier)">${ic('snow',20)}</span><span class="tx"><b>Freezes that saved you</b><span>Missed, streak kept</span></span><span class="v">${frozen}</span></div>`:''}
    <div class="wsum-quote">"${quote}"</div>
    <button class="btn btn-primary" data-act="ov-close">Start a fresh week</button>
  </div></div>`;
}
function ovStreak(){
  const c=compute();
  const pips=[];
  for(let i=0;i<state.freezesMax;i++) pips.push(`<i class="${i<c.freezesLeft?'':'spent'}">${ic('snow',11,2)}</i>`);
  return `<div class="overlay"><div class="sheet">
    <div class="grab"></div>
    <div style="display:grid;place-items:center;margin:2px 0 6px">${ringWrap(weekFills(c),150,`${c.streak>0?`<div class="ring-flame">${ic('flame',18,1.8)}</div>`:''}<div class="ring-num" style="font-size:46px">${c.streak}</div><div class="ring-cap">day streak</div>`)}</div>
    <div class="sd-split">
      <div class="box"><div class="n">${c.streak}</div><div class="l">Current<br>streak</div></div>
      <div class="box"><div class="n">${c.totalDays}</div><div class="l">Total days<br>logged</div></div>
    </div>
    <div class="freeze-card">
      <span class="ic">${ic('snow',26,1.8)}</span>
      <span class="tx"><b>${c.freezesLeft} of ${state.freezesMax} freezes left</b><span>Miss a day and a freeze is used automatically — your streak stays alive. They refill each week.</span>
        <span class="freeze-pips">${pips.join('')}</span></span>
    </div>
    <p class="sd-expl">Your <b>streak</b> counts the days you've shown up in a row. Your <b>total days</b> counts every day you've ever logged — it never goes down, even when a streak ends. Miss a day? A freeze covers it, so one off day doesn't undo a week of effort. <b>The goal isn't to be perfect — it's to keep coming back.</b></p>
    <button class="btn btn-soft" data-act="ov-close" style="margin-top:18px">Got it</button>
  </div></div>`;
}
function ovAdd(){
  const d=UI.draft||{icon:'leaf',remEnabled:true,remTime:'08:00'};
  const choices=ICON_CHOICES.map(n=>`<div class="ah-ic ${d.icon===n?'sel':''}" data-aicon="${n}">${ic(n,20)}</div>`).join('');
  const enabled=d.remEnabled!==false;
  return `<div class="overlay"><div class="sheet">
    <div class="grab"></div>
    <div class="eyebrow">New habit</div>
    <h2 style="margin:4px 0 14px">Add a tiny habit</h2>
    <div class="field"><label>Habit</label><input class="input" id="a-title" placeholder="e.g. Floss" value="${d.title||''}"/></div>
    <div class="field"><label>The tiny version</label><input class="input" id="a-tiny" placeholder="e.g. one tooth (really)" value="${d.tiny||''}"/></div>
    <div class="field"><label>Icon</label><div class="ah-grid">${choices}</div></div>
    <div class="field"><label>Reminder</label>
      <div class="rem-card">
        <div class="rem-row">
          <span class="rem-ic">${ic('bell',20)}</span>
          <span class="rem-tx"><b>Daily nudge</b><span>A single reminder for this habit</span></span>
          <label class="switch"><input type="checkbox" id="a-rem" ${enabled?'checked':''}/><span class="track"></span><span class="knob"></span></label>
        </div>
        <div class="rem-row" ${enabled?'':'style="opacity:.4;pointer-events:none"'}>
          <span class="rem-ic">${ic('clock',20)}</span>
          <span class="rem-tx"><b>Nudge me at</b><span>Time specific to this habit</span></span>
          <input class="time-input" type="time" id="a-time" value="${d.remTime||'08:00'}"/>
        </div>
      </div>
    </div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-soft" data-act="ov-close">Cancel</button>
      <button class="btn btn-primary" data-act="add-save">Add habit</button>
    </div>
  </div></div>`;
}
function ovHabitEdit(){
  const h=state.habits.find(x=>x.id===UI.editId); if(!h) return '';
  const d=UI.draft||{};
  const enabled = d.remEnabled!==false;
  const choices=ICON_CHOICES.map(n=>`<div class="ah-ic ${d.icon===n?'sel':''}" data-aicon="${n}">${ic(n,20)}</div>`).join('');
  return `<div class="overlay"><div class="sheet">
    <div class="grab"></div>
    <div class="eyebrow">Edit habit</div>
    <h2 style="margin:4px 0 14px">Set your nudge</h2>
    <div class="field"><label>Habit</label><input class="input" id="e-title" value="${d.title||''}"/></div>
    <div class="field"><label>The tiny version</label><input class="input" id="e-tiny" value="${d.tiny||''}"/></div>
    <div class="field"><label>Icon</label><div class="ah-grid">${choices}</div></div>
    <div class="field"><label>Reminder for this habit</label>
      <div class="rem-card">
        <div class="rem-row">
          <span class="rem-ic">${ic('bell',20)}</span>
          <span class="rem-tx"><b>Daily nudge</b><span>Turn this habit's reminder on or off</span></span>
          <label class="switch"><input type="checkbox" id="e-rem" ${enabled?'checked':''}/><span class="track"></span><span class="knob"></span></label>
        </div>
        <div class="rem-row" ${enabled?'':'style="opacity:.4;pointer-events:none"'}>
          <span class="rem-ic">${ic('clock',20)}</span>
          <span class="rem-tx"><b>Nudge me at</b><span>A time that fits this habit</span></span>
          <input class="time-input" type="time" id="e-time" value="${d.remTime||'08:00'}"/>
        </div>
      </div>
    </div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-soft" data-act="ov-close">Cancel</button>
      <button class="btn btn-primary" data-act="edit-save">Save</button>
    </div>
    ${state.habits.length>1?`<button class="btn btn-ghost" data-act="edit-delete" style="margin-top:6px;color:var(--ember-deep)">Remove this habit</button>`:''}
  </div></div>`;
}
/* ---------- confetti ---------- */
function burst(){
  const host=$('.overlay'); if(!host) return;
  const c=document.createElement('div'); c.className='confetti';
  const cols=['#5B45F0','#FF6A3D','#8A45DF','#1FA9E0','#FFB48F'];
  for(let i=0;i<18;i++){
    const s=document.createElement('i');
    s.style.left=Math.random()*100+'%';
    s.style.background=cols[i%cols.length];
    s.style.animationDuration=(1.5+Math.random()*1.4)+'s';
    s.style.animationDelay=(Math.random()*.4)+'s';
    s.style.transform='rotate('+(Math.random()*180)+'deg)';
    c.appendChild(s);
  }
  host.appendChild(c);
  setTimeout(()=>c.remove(),3400);
}

/* ---------- toast ---------- */
let toastT=null;
function toast(msg){
  const el=$('#toast'); el.innerHTML=`<span class="tic">${ic('snow',16,2.4)}</span>${msg}`;
  el.classList.add('show'); clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ===========================================================================
   ACTIONS
=========================================================================== */
function logHabit(id){
  const fromFirst=UI.screen==='firstlog';
  const c=compute(); const k=id+'|'+c.curDate;
  if(state.logs[k]) return;
  state.logs[k]=true;
  UI.flash=id;
  const firstEver=!state.seen.firstLog;
  if(firstEver) state.seen.firstLog=true;
  if(fromFirst) UI.screen='app';
  if(firstEver) OQ.push('firstwin');
  save(); render(); runTriggers();
}
function runTriggers(){
  const c=compute();
  if(c.week1>=3 && !state.seen.activated){ state.seen.activated=true; OQ.push('activate'); }
  const maxWeek=Math.floor(c.cur/7);
  for(let w=0; w<=maxWeek; w++){
    const last=w*7+6;
    const weekDone = c.cur>last || (c.cur>=last && c.loggedDay(last));
    if(weekDone && !state.weeksShown.includes(w)){ state.weeksShown.push(w); OQ.push('week:'+w); }
  }
  save(); renderOverlay();
}
function closeTopOverlay(){
  if(OQ.length){ OQ.shift(); }
  else { UI.overlay=null; UI.draft=null; }
  render();
}
function advanceDay(){ state.advance=cursor()+1; save(); render(); runTriggers(); }
function skipDay(){
  const c0=compute();
  // if today is already logged, step two days so one genuine off-day is created (and frozen);
  // otherwise leave today unlogged and step one — today becomes the frozen off-day.
  state.advance = cursor() + (c0.loggedDay(c0.cur) ? 2 : 1);
  save(); render(); runTriggers();
  const c=compute();
  if(c.frozen[c.cur-1]) toast('Day skipped — a freeze kept your streak');
  else toast('Day skipped');
}
function jumpWeek(){
  const start=state.startISO, h=state.habits[0];
  for(let i=0;i<7;i++){ state.logs[h.id+'|'+addDays(start,i)]=true; }
  state.advance=6; state.seen.activated=true; save(); render(); runTriggers();
}

/* ---------- onboarding flow ---------- */
function obNext(){
  const step=UI.obStep;
  if(step===0){ UI.obStep=1; render(); return; }
  if(step===1){
    if(UI.draft.id==='custom'){
      const t=$('#f-title'), ti=$('#f-tiny');
      UI.draft.title=(t&&t.value.trim())||'My habit';
      UI.draft.tiny=(ti&&ti.value.trim())||'keep it tiny';
    }
    UI.obStep=2; render(); return;
  }
  const en=$('#f-rem'), tm=$('#f-time');
  const r=(UI.draft&&UI.draft.reminder)||{enabled:true,time:'08:00'};
  const remEnabled = en?en.checked:(r.enabled!==false);
  const remTime = (tm&&tm.value)||r.time||'08:00';
  const d=UI.draft;
  const habit={ id:'h'+Date.now().toString(36), title:d.title, tiny:d.tiny, cue:d.cue||'', icon:d.icon, remEnabled, remTime };
  state.habits=[habit];
  state.onboarded=true;
  state.startISO=iso(new Date());
  state.startTs=Date.now();
  state.tab='today';
  save();
  UI.screen='firstlog'; UI.draft=null; render();
}

/* ===========================================================================
   EVENTS (delegation)
=========================================================================== */
document.addEventListener('click',e=>{
  const logT=e.target.closest('[data-log]');
  if(logT){ logHabit(logT.getAttribute('data-log')); return; }
  const tmpl=e.target.closest('[data-tmpl]');
  if(tmpl){ const id=tmpl.getAttribute('data-tmpl'); const t=TEMPLATES.find(x=>x.id===id);
    UI.draft=Object.assign({}, UI.draft||{}, { id:t.id, title:t.title==='Something else'?'':t.title, tiny:t.title==='Something else'?'':t.tiny, icon:t.icon }); render(); return; }
  const cue=e.target.closest('[data-cue]');
  if(cue){ const v=cue.getAttribute('data-cue'); UI.draft.cue=UI.draft.cue===v?'':v; render(); return; }
  const aicon=e.target.closest('[data-aicon]');
  if(aicon){ UI.draft=Object.assign({},UI.draft||{},{icon:aicon.getAttribute('data-aicon')}); render(); return; }
  const rp=e.target.closest('[data-rempreset]');
  if(rp){ UI.draft=UI.draft||{}; UI.draft.reminder=UI.draft.reminder||{enabled:true,time:'08:00'}; UI.draft.reminder.time=rp.getAttribute('data-rempreset'); UI.draft.reminder.enabled=true; render(); return; }
  const ed=e.target.closest('[data-edit]');
  if(ed){ const hh=state.habits.find(x=>x.id===ed.getAttribute('data-edit')); if(hh){ UI.editId=hh.id; UI.draft={title:hh.title,tiny:hh.tiny,icon:hh.icon,remEnabled:hh.remEnabled,remTime:hh.remTime}; UI.overlay='habitedit'; render(); } return; }
  const a=e.target.closest('[data-act]'); if(!a) return;
  switch(a.getAttribute('data-act')){
    case 'begin': UI.screen='onboard'; UI.obStep=0; UI.draft={}; render(); break;
    case 'ob-next': obNext(); break;
    case 'ob-back': UI.obStep=Math.max(0,UI.obStep-1); render(); break;
    case 'skip-firstlog': UI.screen='app'; render(); break;
    case 'streak': UI.overlay='streak'; render(); break;
    case 'add': UI.draft={icon:'leaf',remEnabled:true,remTime:'08:00'}; UI.overlay='add'; render(); break;
    case 'add-save': {
      const t=$('#a-title'), ti=$('#a-tiny'), rm=$('#a-rem'), tm=$('#a-time');
      const title=(t&&t.value.trim())||'New habit';
      const tiny=(ti&&ti.value.trim())||'keep it tiny';
      state.habits.push({id:'h'+Date.now().toString(36),title,tiny,cue:'',icon:(UI.draft&&UI.draft.icon)||'leaf',remEnabled:rm?rm.checked:true,remTime:(tm&&tm.value)||'08:00'});
      save(); UI.overlay=null; UI.draft=null; render(); toast('Habit added'); break;
    }
    case 'edit-save': {
      const h=state.habits.find(x=>x.id===UI.editId);
      if(h){ const d=UI.draft||{};
        h.title=(d.title||'').trim()||h.title;
        h.tiny=(d.tiny||'').trim()||h.tiny;
        h.icon=d.icon||h.icon;
        h.remEnabled=!!d.remEnabled;
        h.remTime=d.remTime||h.remTime; }
      UI.overlay=null; UI.draft=null; UI.editId=null; save(); render(); toast('Habit updated'); break;
    }
    case 'edit-delete': {
      const id=UI.editId;
      state.habits=state.habits.filter(x=>x.id!==id);
      for(const k in state.logs){ if(k.split('|')[0]===id) delete state.logs[k]; }
      UI.overlay=null; UI.draft=null; UI.editId=null; save(); render(); toast('Habit removed'); break;
    }
    case 'tab-settings': state.tab='settings'; save(); render(); break;
    case 'd-next': advanceDay(); break;
    case 'd-skip': skipDay(); break;
    case 'd-week': jumpWeek(); break;
    case 'ov-close': closeTopOverlay(); break;
  }
});
/* tap dimmed backdrop to dismiss non-celebration sheets */
document.addEventListener('click',e=>{
  if(e.target.classList && e.target.classList.contains('overlay')){
    const id=OQ[0]||UI.overlay;
    if(id==='streak'||id==='add'||id==='habitedit') closeTopOverlay();
  }
});
/* reminder toggles */
document.addEventListener('change',e=>{
  if(e.target.id==='f-rem'){ UI.draft.reminder=UI.draft.reminder||{enabled:true,time:'08:00'}; UI.draft.reminder.enabled=e.target.checked; render(); }
  if(e.target.id==='f-time'){ UI.draft.reminder=UI.draft.reminder||{enabled:true,time:'08:00'}; UI.draft.reminder.time=e.target.value; }
  if(e.target.id==='a-rem'){ UI.draft=UI.draft||{}; UI.draft.remEnabled=e.target.checked; render(); }
  if(e.target.id==='a-time'){ UI.draft=UI.draft||{}; UI.draft.remTime=e.target.value; }
  if(e.target.id==='e-rem'){ UI.draft=UI.draft||{}; UI.draft.remEnabled=e.target.checked; render(); }
  if(e.target.id==='e-time'){ UI.draft=UI.draft||{}; UI.draft.remTime=e.target.value; }
});
/* keep text inputs in draft as you type (so re-renders don't lose them) */
document.addEventListener('input',e=>{
  if(e.target.id==='f-title') UI.draft.title=e.target.value;
  if(e.target.id==='f-tiny')  UI.draft.tiny=e.target.value;
  if(e.target.id==='a-title'){ UI.draft=UI.draft||{}; UI.draft.title=e.target.value; }
  if(e.target.id==='a-tiny'){  UI.draft=UI.draft||{}; UI.draft.tiny=e.target.value; }
  if(e.target.id==='e-title'){ UI.draft=UI.draft||{}; UI.draft.title=e.target.value; }
  if(e.target.id==='e-tiny'){  UI.draft=UI.draft||{}; UI.draft.tiny=e.target.value; }
});

/* nav */
$$('#nav button').forEach(b=>b.addEventListener('click',()=>{ state.tab=b.getAttribute('data-tab'); save(); render(); }));
function syncNav(){ $$('#nav button').forEach(b=>b.classList.toggle('on', b.getAttribute('data-tab')===state.tab)); }
function setNavIcons(){
  const map={today:'home',progress:'chart',settings:'user'};
  $$('#nav button').forEach(b=>{ const s=b.querySelector('.navic'); if(s) s.innerHTML=ic(map[b.getAttribute('data-tab')],20,2); });
}

/* ---------- boot ---------- */
setNavIcons();
render();
</script>
</body>
</html>
